<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sequence — Online Multiplayer</title>
  <!-- Instant redirect to the Netlify app -->
  <meta http-equiv="refresh" content="0; url=https://sequence-game-81720.netlify.app">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=Cinzel:wght@800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', sans-serif;
      background: #0f0b1e;
      background-image: radial-gradient(circle at 50% 50%, #1a123a 0%, #0f0b1e 100%);
      color: white;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }
    h1 {
      font-family: 'Cinzel', serif;
      font-size: 2rem;
      font-weight: 800;
      color: white;
      text-shadow: 0 0 20px rgba(16,217,210,0.5);
      letter-spacing: 4px;
    }
    p {
      color: rgba(255,255,255,0.55);
      font-size: 0.95rem;
    }
    .spinner {
      width: 42px;
      height: 42px;
      border: 3px solid rgba(16,217,210,0.2);
      border-top-color: #10d9d2;
      border-radius: 50%;
      animation: spin 0.85s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    a {
      color: #10d9d2;
      font-weight: 700;
      text-decoration: none;
    }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <h1>SEQUENCE</h1>
  <p>Redirecting to Online Multiplayer...</p>
  <p style="margin-top:8px; font-size:0.8rem;">
    Not redirected? <a href="https://sequence-game-81720.netlify.app">Click here</a>
  </p>

  <script>
    // Immediate JS redirect as backup
    window.location.replace("https://sequence-game-81720.netlify.app");
  </script>
</body>
</html>
