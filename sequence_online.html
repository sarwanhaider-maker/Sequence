<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sequence — Online Multiplayer</title>
  <!-- Instant redirect to the Netlify app -->
  <meta http-equiv="refresh" content="0; url=https://sequence-liard-theta.vercel.app/">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=Cinzel:wght@800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', sans-serif;
      background: #0f0b1e;
      color: white;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .fallback-container {
      display: none;
      text-align: center;
      animation: fadeIn 0.5s ease-in-out forwards;
    }
    a {
      color: #10d9d2;
      font-weight: 700;
      text-decoration: none;
    }
    a:hover { text-decoration: underline; }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="fallback" class="fallback-container">
    <p style="color: rgba(255,255,255,0.6); font-size: 0.95rem;">Not redirected automatically?</p>
    <p style="margin-top: 8px;"><a href="https://sequence-liard-theta.vercel.app/">Click here to open the game</a></p>
  </div>

  <script>
    // Immediate JS redirect as backup
    window.location.replace("https://sequence-liard-theta.vercel.app/");

    // If redirect fails or takes too long, show fallback link after 3 seconds
    setTimeout(function() {
      var fb = document.getElementById("fallback");
      if (fb) fb.style.display = "block";
    }, 3000);
  </script>
</body>
</html>
